{% extends 'bookings/base.html' %}
{% block content %}
<div class="card">
    <h2>User Profile</h2>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="first_name" value="{{ user.first_name }}" placeholder="First Name">
        <input type="text" name="last_name" value="{{ user.last_name }}" placeholder="Last Name">
        <input type="email" name="email" value="{{ user.email }}" placeholder="Email" required>
        <button type="submit" class="btn">Update Profile</button>
    </form>
    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Account Type:</strong> {% if user.is_staff %}Admin{% else %}Normal User{% endif %}</p>
</div>
{% endblock %}
