{% extends 'bookings/base.html' %}
{% block content %}
<div class="card">
    <h2>Delete Booking</h2>
    <p>Are you sure you want to delete booking #{{ booking.id }} ({{ booking.get_service_type_display }})?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a href="{% url 'booking_list' %}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
